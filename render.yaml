# Deploiement Render.com — https://render.com
# 1. Connecter le repo GitHub Oceduff21/vite-gourmand
# 2. New > Blueprint > coller ce fichier
# 3. Ajouter MONGO_URI (MongoDB Atlas) dans les variables du service web

services:
  - type: web
    name: vite-gourmand
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: vite-gourmand-db
          property: host
      - key: DB_NAME
        fromDatabase:
          name: vite-gourmand-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: vite-gourmand-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: vite-gourmand-db
          property: password
      - key: MONGO_URI
        sync: false

databases:
  - name: vite-gourmand-db
    plan: free
    databaseName: vite_gourmand
    user: vite_gourmand
